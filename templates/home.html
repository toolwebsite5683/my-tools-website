<!DOCTYPE html>
<html>
    <head>

                height:50px;

                background:#4CAF50;
                color:white;
                border-radius:5px;
                cursor:pointer;

            button:hover{
                background:#45a049;
            }

        </style>
    </head>
    
    <body>

            <a href="/age"><button>Age Calculator</button></a>

            <a href="/qr"><button>QR Code Generator</button></a>

            <a href="/calculator"><button>Calculator</button></a>

</html>
